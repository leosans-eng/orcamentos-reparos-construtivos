# Stack API ORC: PostgreSQL + FastAPI (servidor Windows + Docker Desktop)
#
#   copy .env.example .env
#   run_dev.bat
#   # ou: docker compose up -d --build

services:
  db:
    image: postgres:16-alpine
    container_name: orc-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orc_dev}
      POSTGRES_DB: ${POSTGRES_DB:-orc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - orc_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orc-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-orc}:${POSTGRES_PASSWORD:-orc_dev}@db:5432/${POSTGRES_DB:-orc}
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave-em-producao}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
      SEED_DATA_DIR: /app/dados_usuario
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./dados_usuario:/app/dados_usuario:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

volumes:
  orc_pg_data:
