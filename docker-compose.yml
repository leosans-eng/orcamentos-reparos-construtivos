# PostgreSQL para a API ORC.
# Uso: docker compose up -d
# A API lê DATABASE_URL em api/.env.
services:
  db:
    image: postgres:16-alpine
    container_name: orc-postgres
    environment:
      POSTGRES_USER: orc
      POSTGRES_PASSWORD: orc_dev
      POSTGRES_DB: orc
    ports:
      - "5432:5432"
    volumes:
      - orc_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orc -d orc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  orc_pg_data:
